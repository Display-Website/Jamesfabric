<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品展示 - James Fabric</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo">James Fabric</div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="products.html" class="active">产品展示</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="products-hero">
            <h1>我们的产品</h1>
            <p>探索我们丰富多样的面料系列</p>
        </section>

        <section class="products-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="images/fabric1.jpg" alt="棉质面料" loading="lazy">
                </div>
                <div class="product-info">
                    <h3>优质棉质面料</h3>
                    <p>100%纯棉，柔软舒适，透气性好</p>
                    <div class="product-features">
                        <span>抗皱</span>
                        <span>透气</span>
                        <span>环保</span>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="images/fabric2.jpg" alt="丝绸面料" loading="lazy">
                </div>
                <div class="product-info">
                    <h3>高档丝绸面料</h3>
                    <p>天然蚕丝，光泽柔美，垂坠感强</p>
                    <div class="product-features">
                        <span>光泽感</span>
                        <span>垂坠</span>
                        <span>奢华</span>
                    </div>
                </div>
            </div>

            <div class="product-card">
                <div class="product-image">
                    <img src="images/fabric3.jpg" alt="混纺面料" loading="lazy">
                </div>
                <div class="product-info">
                    <h3>创新混纺面料</h3>
                    <p>科技与舒适的完美结合</p>
                    <div class="product-features">
                        <span>弹力</span>
                        <span>耐用</span>
                        <span>易打理</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="contact-section">
            <h2>寻找特定面料？</h2>
            <p>我们提供定制化面料解决方案，请联系我们了解更多详情</p>
            <a href="mailto:contact@jamesfabric.com" class="contact-button">联系我们</a>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-info">
                <h3>联系我们</h3>
                <p>电话：+86 123 4567 8900</p>
                <p>邮箱：contact@jamesfabric.com</p>
            </div>
            <div class="footer-copyright">
                <p>&copy; 2024 James Fabric. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
